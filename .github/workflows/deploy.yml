name: Deploy SHINKEN

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'render'
        type: choice
        options: [render, railway, heroku, all]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "No tests configured"

  deploy-render:
    needs: test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.target == 'render' ||
      github.event.inputs.target == 'all'
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then echo "Render not configured, skip"; exit 0; fi
          curl -sf -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
          echo "Render deploy triggered"

  deploy-railway:
    needs: test
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.target == 'railway' ||
      github.event.inputs.target == 'all'
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - run: railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-heroku:
    needs: test
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.target == 'heroku' ||
      github.event.inputs.target == 'all'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
