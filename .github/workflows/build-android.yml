name: Build Android APK

on:
  push:
    branches: [main]
    paths: ['client/**', 'App.js']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release'
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Setup Capacitor Android
        run: |
          npm install @capacitor/cli
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          cp android/app/build/outputs/apk/debug/app-debug.apk shinken-$DATE.apk
          echo "APK_NAME=shinken-$DATE.apk" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: shinken-apk
          path: ${{ env.APK_NAME }}
          retention-days: 30

      - name: Create Release
        if: github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SHINKEN v${{ github.run_number }}
          body: |
            ## SHINKEN Android APK - v${{ github.run_number }}
            Commit: `${{ github.sha }}`

            **Installation :**
            1. Télécharge le fichier `.apk`
            2. Active "Sources inconnues" sur Android
            3. Installe l'APK
          files: ${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: npm install

      - name: Setup Capacitor Android
        run: |
          npm install @capacitor/cli
          npx cap add android
          npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/shinken.jks

      - name: Build signed APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=shinken.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: shinken-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
